services:
  - type: web
    name: changsuoyuyan-api
    runtime: node
    region: singapore
    plan: free
    # monorepo：用 corepack 启用 pnpm（无需全局安装，避免只读文件系统报错）
    buildCommand: corepack enable && corepack prepare pnpm@10.34.1 --activate && pnpm install --no-frozen-lockfile
    startCommand: corepack pnpm --filter @rugby/content-service start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false        # 在 Render 后台手动填 Neon 连接串
      - key: JWT_SECRET
        generateValue: true # Render 自动生成强密钥
      - key: GROQ_API_KEY
        sync: false        # 后台手动填
      - key: CORS_ORIGINS
        sync: false        # 部署前端后填 Vercel 域名
