services:
  - type: web
    name: changsuoyuyan-api
    runtime: node
    region: singapore
    plan: free
    # Render 自带 pnpm（检测到 pnpm-lock.yaml 自动启用），无需手动安装
    buildCommand: pnpm install --no-frozen-lockfile
    startCommand: pnpm --filter @rugby/content-service start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false        # 在 Render 后台手动填 Neon 连接串
      - key: JWT_SECRET
        generateValue: true # Render 自动生成强密钥
      - key: GROQ_API_KEY
        sync: false        # 后台手动填
      - key: CORS_ORIGINS
        sync: false        # 部署前端后填 Vercel 域名
